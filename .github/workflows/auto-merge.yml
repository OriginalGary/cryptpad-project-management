# Auto-Merge Caller — copy this file to .github/workflows/auto-merge.yml in each repo.
#
# What it does: calls the org-level reusable auto-merge workflow in Open-Paws/.github.
# All logic lives in the reusable workflow — this file only sets the repo-specific threshold.
#
# SETUP CHECKLIST:
#   1. Copy this file to .github/workflows/auto-merge.yml in the target repo.
#   2. Set the desloppify_threshold input for this repo:
#        gary:                  80
#        open-paws-platform:    75
#        open-paws-api-gateway: 75
#        all other repos:       70  (the default — you can omit the input entirely)
#   3. Ensure GH_PAT_AUTO_MERGE is set as an org-level secret (or repo secret).
#      It needs: repo scope + pull_request write + contents write.
#   4. Ensure the required labels exist (run setup-labels.yml workflow_dispatch once):
#        wave0-auto, level-0, needs-human-review, human-gate
#   5. For auto-merge to work, enable 'Allow auto-merge' in repo Settings > General.
#
# TRIGGER:
#   - pull_request: opened, synchronize, reopened, labeled
#   - The reusable workflow evaluates all five gates on each trigger.

name: Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  auto-merge:
    # Only run on PRs targeting the default branch
    if: github.event.pull_request.base.ref == github.event.repository.default_branch
    uses: Open-Paws/.github/.github/workflows/auto-merge.yml@main
    with:
      # Set to repo-specific threshold. Remove this line to use the default (70).
      desloppify_threshold: 70
      # Add extra agent logins here if your repo has custom bot accounts, e.g.:
      # known_agents: 'my-custom-bot renovate[bot]'
      known_agents: ''
    secrets: inherit
