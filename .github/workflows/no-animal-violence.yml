name: No Animal Violence Check
on:
  pull_request:
    paths:
      - '**/*.py'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
      - '**/*.astro'
      - '**/*.md'
      - '**/*.yaml'
      - '**/*.yml'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Open-Paws/no-animal-violence-action@main
